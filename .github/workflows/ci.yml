name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Instala dependências de forma limpa e reproduzível (usa package-lock.json)
      - name: Install dependencies
        run: npm ci

      # Garante que o projeto compila (Vite + Tailwind) sem erros
      - name: Build
        run: npm run build
