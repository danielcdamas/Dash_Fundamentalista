name: Atualiza fundamentos da CVM

# Roda o coletor de dados abertos da CVM (npm run fetch:cvm) na nuvem e
# commita o JSON gerado de volta no branch — útil porque a coleta precisa
# de internet e não exige nada instalado na máquina de quem aciona.
on:
  workflow_dispatch: {}
  schedule:
    # 1x por mês (dia 1, 06:00 UTC) — as DFPs da CVM mudam raramente.
    - cron: '0 6 1 * *'
  push:
    # Gatilho temporário para a primeira coleta (o push do bot com
    # GITHUB_TOKEN não redispara o workflow, então não há recursão).
    branches: [claude/cvm-fundamentals]

permissions:
  contents: write

jobs:
  fetch:
    name: Coleta CVM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Coleta dados da CVM
        run: npm run fetch:cvm

      - name: Commit do JSON atualizado (se mudou)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/cvmFundamentals.json
          git diff --staged --quiet || git commit -m "Atualiza fundamentos da CVM (coleta automática)"
          git push
